name: Release LTS version to npm and update repository

on:
  workflow_call:
    inputs:
      target:
        required: true
        type: string

jobs:
  deploy:
    name: Publish to Amplify Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: amplify-js
          token: ${{ secrets.GH_TOKEN_AMPLIFY_JS_WRITE }}
          # Minimal depth 0 so we can fetch all git tags.
          fetch-depth: 0

      - name: Setup node and build the repository
        uses: ./amplify-js/.github/actions/node-and-build

      - name: Run npm publish
        uses: ./amplify-js/.github/actions/npm-publish
        with:
          target: ${{ inputs.target }}
          npm_token: ${{ secrets.NPM_TOKEN }}
          github_user: ${{ vars.GH_USER}}
          github_email: ${{ vars.GH_EMAIL}}

      - name: Set github commit user
        env:
          GITHUB_EMAIL: ${{ vars.GH_EMAIL }}
          GITHUB_USER: ${{ vars.GH_USER }}
        run: |
          git config --global user.email $GITHUB_EMAIL
          git config --global user.name $GITHUB_USER

      - name: Update API documentation
        working-directory: ./amplify-js
        run: |
          yarn run docs
          git add ./docs/api/
          git commit -m "chore(release): update API docs [ci skip]"

      - name: Push post release changes
        working-directory: ./amplify-js
        env:
          TARGET_BRANCH: ${{ inputs.target }}
        run: |
          git push origin $TARGET_BRANCH

  # amazon-cognito-identity-js is a v5-only package with no newer major line, so its
  # `latest` dist-tag must track the v5 release. This is specific to the v5 LTS line:
  # gate on target so it cannot regress `latest` if this workflow is reused for another
  # LTS branch (see the TODO in push-lts-release.yml).
  set-latest-tag:
    name: Point amazon-cognito-identity-js latest at the v5 release
    needs: deploy
    if: github.repository_owner == 'aws-amplify' && inputs.target == 'v5-stable'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: amplify-js
          ref: ${{ inputs.target }}

      - name: Set amazon-cognito-identity-js latest dist-tag
        working-directory: ./amplify-js
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc
          PKG=amazon-cognito-identity-js
          VERSION=$(node -p "require('./packages/amazon-cognito-identity-js/package.json').version")
          echo "Ensuring $PKG@$VERSION is set as the latest dist-tag"
          # Wait for the freshly published version to be visible on the registry.
          for i in $(seq 1 10); do
            npm view "$PKG@$VERSION" version >/dev/null 2>&1 && break
            echo "attempt $i: $PKG@$VERSION not visible yet; waiting 15s"
            sleep 15
          done
          # Idempotent: dist-tag add overwrites, so re-running this job is safe.
          for i in $(seq 1 5); do
            npm dist-tag add "$PKG@$VERSION" latest && exit 0
            echo "dist-tag attempt $i failed; retrying in 15s"
            sleep 15
          done
          echo "::error::failed to set latest for $PKG@$VERSION after retries"
          exit 1
