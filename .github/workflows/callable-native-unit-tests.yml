name: Native Unit Tests

on: workflow_call

jobs:
  get-package-list:
    uses: ./.github/workflows/callable-get-package-list.yml
  unit_test:
    name: Native Unit Test - ${{ matrix.package.name }}
    runs-on: macos-latest
    needs: get-package-list
    strategy:
      matrix:
        package: ${{ fromJSON(needs.get-package-list.outputs.nativePackages) }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: amplify-js
      - name: Setup node and build the repository
        uses: ./amplify-js/.github/actions/node-and-build
      - name: Run iOS Tests
        working-directory: ./amplify-js
        env:
          TEST_PACKAGE: ${{ matrix.package.name }}
        run: |
          yarn workspace $TEST_PACKAGE prepare:ios
          yarn workspace $TEST_PACKAGE test:ios
      - name: Run Android Tests
        working-directory: ./amplify-js
        env:
          TEST_PACKAGE: ${{ matrix.package.name }}
        run: |
          yarn workspace $TEST_PACKAGE prepare:android
          yarn workspace $TEST_PACKAGE test:android
