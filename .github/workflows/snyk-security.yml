name: Snyk Security (Dependencies Only)

on:
  push:
    branches: ['ci/snyk-test']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snyk:
    permissions:
      contents: read
      security-events: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Install dependencies
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # 2. Install Snyk CLI
      - name: Set up Snyk CLI
        uses: snyk/actions/setup@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # 3. Run Dependency Scan on all projects
      - name: Snyk Open Source test
        run: snyk test --all-projects --exclude=android,docs --strict-out-of-sync=false --sarif-file-output=snyk-deps.sarif || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}