name: E2E Test - Detox
run-name: e2e-detox.${{ inputs.test_name }}

on:
  workflow_call:
    inputs:
      test_name:
        required: true
        type: string
      working_directory:
        required: true
        type: string
      timeout_minutes:
        required: true
        type: number

jobs:
  e2e-test:
    name: E2E-Detox ${{ inputs.test_name }}
    # Pin to macOS 15 instead of macos-latest: `macos-latest` now resolves to
    # macOS 26, which ships only Xcode 26.x and iOS 26 simulators. These React
    # Native sample apps and the "iPhone 16" (iOS 18.x) simulator require the
    # Xcode 16.4 / iOS 18 toolchain that ships on the macOS 15 image.
    runs-on: macos-15-large
    timeout-minutes: ${{ inputs.timeout_minutes }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: amplify-js
      - name: Setup node and build the repository
        uses: ./amplify-js/.github/actions/node-and-build
      - name: Set Xcode version
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app
          xcodebuild -version
      - name: Setup samples staging repository
        uses: ./amplify-js/.github/actions/setup-samples-staging
        with:
          GH_TOKEN_STAGING_READ: ${{ secrets.GH_TOKEN_STAGING_READ }}
      - name: Load Verdaccio with AmplifyJs
        uses: ./amplify-js/.github/actions/load-verdaccio-with-amplify-js
      - name: Yarn Install
        working-directory: ${{ inputs.working_directory }}
        run: |
          echo "Current NPM registry: " $(yarn config get registry)
          $GITHUB_WORKSPACE/amplify-js/scripts/retry-yarn-script.sh -s 'install --frozen-lockfile --non-interactive' -n 3
        shell: bash
      - name: Install CocoaPods
        run: |
          cd ios && pod install
        working-directory: ${{ inputs.working_directory }}
        shell: bash
      - name: Start iOS simulator (background)
        run: |
          xcrun simctl boot "iPhone 16" &
        shell: bash
      - name: Start Metro Packager (background)
        run: |
          yarn start &
        working-directory: ${{ inputs.working_directory }}
        shell: bash
      - name: Configure Detox
        env:
          HOMEBREW_NO_AUTO_UPDATE: '1'
        run: |
          # Homebrew 5.2+/6 refuses to load formulae from untrusted third-party
          # taps. Installing with the fully-qualified name trusts only this
          # formula (instead of `brew tap wix/brew` + short name, which now
          # fails with "Refusing to load formula ... from untrusted tap").
          brew install wix/brew/applesimutils
          yarn global add detox-cli
        working-directory: ${{ inputs.working_directory }}
        shell: bash
      - name: Detox Build
        run: |
          detox build -c ios.sim.debug
        env:
          JEST_JUNIT_OUTPUT_DIR: reports/junit
          JEST_JUNIT_OUTPUT_NAME: detox-test-results.xml
        working-directory: ${{ inputs.working_directory }}
        shell: bash
      - name: Detox run
        run: |
          $GITHUB_WORKSPACE/amplify-js/scripts/retry-yarn-script.sh -s 'detox test -c ios.sim.debug -u' -n 3
        working-directory: ${{ inputs.working_directory }}
        shell: bash
